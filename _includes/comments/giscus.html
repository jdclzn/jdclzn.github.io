<!-- https://giscus.app/ -->
<script>
  (function () {
    const themeMapper = Theme.getThemeMapper('light', 'dark');
    const initTheme = themeMapper[Theme.visualState];

    let lang = '{{ site.comments.giscus.lang | default: lang }}';
    {%- comment -%} https://github.com/giscus/giscus/tree/main/locales {%- endcomment -%}
    if (lang.length > 2 && !lang.startsWith('zh')) {
      lang = lang.slice(0, 2);
    }

    const footer = document.querySelector('footer');
    if (!footer) {
      return;
    }

    let container = document.getElementById('giscus-container');

    if (!container) {
      const shell = document.createElement('section');
      shell.id = 'comments';
      shell.className = 'comment-shell';
      shell.setAttribute('aria-label', 'Comments');
      shell.innerHTML = [
        '<div class="comment-shell__header">',
        '  <div>',
        '    <h2 class="comment-shell__title">Discussion</h2>',
        '  </div>',
        '</div>',
        '<div class="comment-shell__body">',
        '  <div id="giscus-container"></div>',
        '</div>'
      ].join('');

      footer.insertAdjacentElement('beforebegin', shell);
      container = document.getElementById('giscus-container');
    }

    const giscusAttributes = {
      src: 'https://giscus.app/client.js',
      'data-repo': '{{ site.comments.giscus.repo }}',
      'data-repo-id': '{{ site.comments.giscus.repo_id }}',
      'data-category': '{{ site.comments.giscus.category }}',
      'data-category-id': '{{ site.comments.giscus.category_id }}',
      'data-mapping': '{{ site.comments.giscus.mapping | default: 'pathname' }}',
      'data-strict': '{{ site.comments.giscus.strict | default: '0' }}',
      'data-reactions-enabled': '{{ site.comments.giscus.reactions_enabled | default: '1' }}',
      'data-emit-metadata': '0',
      'data-theme': initTheme,
      'data-input-position': '{{ site.comments.giscus.input_position | default: 'top' }}',
      'data-lang': lang,
      'data-loading': 'lazy',
      crossorigin: 'anonymous',
      async: ''
    };

    const giscusNode = document.createElement('script');
    Object.entries(giscusAttributes).forEach(([key, value]) => giscusNode.setAttribute(key, value));
    container.replaceChildren(giscusNode);

    addEventListener('message', (event) => {
      if (!(event.source === window && event.data && event.data.id === Theme.ID)) {
        return;
      }

      const frame = document.getElementsByClassName('giscus-frame')[0];
      if (!frame) {
        return;
      }

      const message = {
        setConfig: {
          theme: themeMapper[Theme.visualState]
        }
      };

      frame.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
    });
  })();
</script>
